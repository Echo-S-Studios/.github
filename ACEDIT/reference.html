<html lang="en">
<head>

<title>ACEDIT — Reference &amp; Converter</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --gold: #daa520;
    --purple: #9370db;
    --blue: #4169e1;
    --magenta: #da70d6;
    --green: #3cb371;
    --pink: #ff69b4;
    --convergence: 0.866;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    line-height: 1.6;
    padding: 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1, h2, h3 { margin-bottom: 0.5em; }
  h1 {
    font-size: 2.5rem;
    text-align: center;
    margin-bottom: 0.25em;
    background: linear-gradient(135deg, var(--purple), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    text-align: center;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 2rem;
    font-size: 1.1rem;
  }
  .meta-line {
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .meta-line code {
    color: var(--gold);
    background: var(--surface);
    padding: 0.15em 0.4em;
    border-radius: 3px;
    font-size: 0.9em;
  }

  /* Converter */
  .converter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }
  .converter h2 { color: var(--purple); font-size: 1.3rem; }
  .converter-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: start;
    margin-top: 1rem;
  }
  .converter-grid textarea {
    width: 100%;
    min-height: 120px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    font-size: 1.05rem;
    font-family: 'Segoe UI', sans-serif;
    resize: vertical;
  }
  .converter-grid textarea:focus {
    outline: none;
    border-color: var(--purple);
  }
  .converter-controls {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding-top: 0.5rem;
  }
  .register-select {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .register-select:focus { outline: none; border-color: var(--gold); }
  .btn {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--purple); color: var(--purple); }
  .btn.primary {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    border: none;
    color: #fff;
    font-weight: 600;
  }
  .btn.primary:hover { opacity: 0.9; }
  .arrow-indicator {
    font-size: 1.5rem;
    color: var(--gold);
    text-align: center;
    line-height: 120px;
  }

  /* Modifier checkboxes */
  .modifier-row {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 0.75rem;
  }
  .modifier-row label {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.85rem;
    color: var(--text-muted);
    cursor: pointer;
  }
  .modifier-row input[type="checkbox"] {
    accent-color: var(--purple);
  }

  /* Register tables */
  .domain-section {
    margin-bottom: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .domain-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .domain-header:hover { background: rgba(255,255,255,0.02); }
  .domain-header h3 { font-size: 1.15rem; }
  .domain-header .tag {
    font-size: 0.75rem;
    padding: 0.2em 0.6em;
    border-radius: 12px;
    font-weight: 600;
  }
  .tag-gold { background: rgba(218,165,32,0.15); color: var(--gold); }
  .tag-purple { background: rgba(147,112,219,0.15); color: var(--purple); }
  .tag-blue { background: rgba(65,105,225,0.15); color: var(--blue); }

  .domain-body { padding: 1rem 1.5rem; }
  .domain-body.collapsed { display: none; }
  .domain-desc {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 1rem;
    font-style: italic;
  }

  .glyph-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 6px;
  }
  .glyph-cell {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
    padding: 6px 2px;
    transition: border-color 0.15s;
    cursor: pointer;
    position: relative;
  }
  .glyph-cell:hover {
    border-color: var(--purple);
  }
  .glyph-cell .glyph {
    font-size: 1.4rem;
    display: block;
    line-height: 1.3;
  }
  .glyph-cell .label {
    font-size: 0.6rem;
    color: var(--text-muted);
    display: block;
    margin-top: 2px;
  }
  .glyph-cell.copied::after {
    content: '✓';
    position: absolute;
    top: 2px; right: 4px;
    font-size: 0.6rem;
    color: var(--green);
  }

  /* Operators section */
  .operator-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .operator-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .operator-card:hover { border-color: var(--gold); }
  .operator-card .op-glyph {
    font-size: 1.6rem;
    display: inline-block;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .operator-card .op-name {
    font-weight: 600;
    font-size: 0.9rem;
    vertical-align: middle;
  }
  .operator-card .op-desc {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* Ligatures */
  .ligature-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 8px;
  }
  .ligature-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .ligature-card:hover { border-color: var(--magenta); }
  .ligature-card .lig-rendered {
    font-size: 1.3rem;
    margin-bottom: 0.25rem;
  }
  .ligature-card .lig-name {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* Constants */
  .constants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .const-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem;
  }
  .const-card .const-val {
    font-size: 1.4rem;
    color: var(--gold);
    font-weight: 700;
  }
  .const-card .const-expr {
    font-size: 0.85rem;
    color: var(--purple);
    font-family: 'Cambria Math', 'STIX Two Math', serif;
  }
  .const-card .const-name {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  /* Punctuation */
  .punct-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 6px;
  }
  .punct-cell {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    text-align: center;
    padding: 8px 4px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .punct-cell:hover { border-color: var(--gold); }
  .punct-cell .glyph { font-size: 1.3rem; display: block; }
  .punct-cell .label { font-size: 0.6rem; color: var(--text-muted); display: block; margin-top: 2px; }

  /* Responsive */
  @media (max-width: 700px) {
    .converter-grid {
      grid-template-columns: 1fr;
    }
    .arrow-indicator {
      transform: rotate(90deg);
      line-height: 2;
    }
    body { padding: 1rem; }
  }

  /* Section headings */
  .section-heading {
    margin: 2.5rem 0 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .section-heading h2 {
    font-size: 1.4rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--purple);
    color: var(--text);
    padding: 0.5rem 1.5rem;
    border-radius: 8px;
    font-size: 0.85rem;
    opacity: 0;
    transition: all 0.3s;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>

// ── Helpers ─────────────────────────────────────────────────────────
const ALPHA_UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const ALPHA_LOWER = "abcdefghijklmnopqrstuvwxyz";
const DIGITS = "0123456789";

function toArray(str) {
  return [...str];
}

function buildMap(reg) {
  const r = ACEDIT.registers[reg];
  const map = {};
  const up = toArray(r.upper);
  const lo = toArray(r.lower);
  const di = toArray(r.digits);
  for (let i = 0; i < 26; i++) {
    map[ALPHA_UPPER[i]] = up[i];
    map[ALPHA_LOWER[i]] = lo[i];
  }
  for (let i = 0; i < 10; i++) {
    map[DIGITS[i]] = di[i];
  }
  return map;
}

function getActiveModifiers() {
  const mods = [];
  for (const [key, val] of Object.entries(ACEDIT.modifiers)) {
    if (document.getElementById('mod-' + key)?.checked) {
      mods.push(val.combining);
    }
  }
  return mods;
}

function convert() {
  const reg = document.getElementById('register-select').value;
  const input = document.getElementById('input').value;
  const map = buildMap(reg);
  const mods = getActiveModifiers();
  const usePunct = document.getElementById('use-punct').checked;

  let result = '';
  for (const ch of input) {
    let mapped = map[ch];
    if (!mapped && usePunct) {
      mapped = ACEDIT.punctuation[ch];
    }
    if (mapped) {
      result += mapped;
      for (const m of mods) result += m;
    } else {
      result += ch;
    }
  }
  document.getElementById('output').value = result;
}

function copyOutput() {
  const out = document.getElementById('output');
  navigator.clipboard.writeText(out.value).then(() => showToast('Copied to clipboard!'));
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('output').value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Copied: ' + text));
}

// Auto-convert on input
document.getElementById('input')?.addEventListener('input', convert);
document.getElementById('register-select')?.addEventListener('change', convert);
document.querySelectorAll('.modifier-row input, #use-punct').forEach(el =>
  el.addEventListener('change', convert)
);

// ── Render Register Reference ───────────────────────────────────────
function renderRegisters() {
  const container = document.getElementById('registers-container');
  for (const [name, reg] of Object.entries(ACEDIT.registers)) {
    const section = document.createElement('div');
    section.className = 'domain-section';

    const tagClass = 'tag-' + reg.tag;
    section.innerHTML = `
      <div class="domain-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <h3 style="color:${reg.color}">${name} <span style="font-weight:400;color:var(--text-muted)">— ${reg.role}</span></h3>
        <span class="tag ${tagClass}">${reg.domain.split(' ')[0]}</span>
      </div>
      <div class="domain-body">
        <div class="domain-desc">${reg.domain}</div>
        <div class="glyph-grid" id="grid-${name}"></div>
      </div>
    `;
    container.appendChild(section);

    const grid = section.querySelector('.glyph-grid');
    const up = toArray(reg.upper);
    const lo = toArray(reg.lower);
    const di = toArray(reg.digits);

    for (let i = 0; i < 26; i++) {
      grid.appendChild(makeGlyphCell(up[i], ALPHA_UPPER[i]));
    }
    for (let i = 0; i < 26; i++) {
      grid.appendChild(makeGlyphCell(lo[i], ALPHA_LOWER[i]));
    }
    for (let i = 0; i < 10; i++) {
      grid.appendChild(makeGlyphCell(di[i], DIGITS[i]));
    }
  }
}

function makeGlyphCell(glyph, label) {
  const cell = document.createElement('div');
  cell.className = 'glyph-cell';
  cell.innerHTML = `<span class="glyph">${glyph}</span><span class="label">${label}</span>`;
  cell.onclick = () => {
    copyText(glyph);
    cell.classList.add('copied');
    setTimeout(() => cell.classList.remove('copied'), 1200);
  };
  return cell;
}

// ── Render Operators ────────────────────────────────────────────────
function renderOperators() {
  const container = document.getElementById('operators-container');
  for (const op of ACEDIT.operators) {
    const card = document.createElement('div');
    card.className = 'operator-card';
    card.innerHTML = `
      <span class="op-glyph">${op.glyph}</span>
      <span class="op-name">${op.name}</span>
      <div class="op-desc">${op.desc}</div>
    `;
    card.onclick = () => copyText(op.glyph);
    container.appendChild(card);
  }
}

// ── Render Ligatures ────────────────────────────────────────────────
function renderLigatures() {
  const container = document.getElementById('ligatures-container');
  for (const [name, rendered] of Object.entries(ACEDIT.ligatures)) {
    const card = document.createElement('div');
    card.className = 'ligature-card';
    card.innerHTML = `
      <div class="lig-rendered">${rendered}</div>
      <div class="lig-name">${name}</div>
    `;
    card.onclick = () => copyText(rendered);
    container.appendChild(card);
  }
}

// ── Render Constants ────────────────────────────────────────────────
function renderConstants() {
  const container = document.getElementById('constants-container');
  for (const c of ACEDIT.constants) {
    const card = document.createElement('div');
    card.className = 'const-card';
    card.innerHTML = `
      <div class="const-val">${c.val}</div>
      <div class="const-expr">${c.expr}</div>
      <div class="const-name">${c.name}</div>
    `;
    container.appendChild(card);
  }
}

// ── Render Punctuation ──────────────────────────────────────────────
function renderPunctuation() {
  const container = document.getElementById('punctuation-container');
  for (const [standard, acedit] of Object.entries(ACEDIT.punctuation)) {
    const cell = document.createElement('div');
    cell.className = 'punct-cell';
    cell.innerHTML = `<span class="glyph">${acedit}</span><span class="label">${standard} → ${acedit}</span>`;
    cell.onclick = () => copyText(acedit);
    container.appendChild(cell);
  }
}

// ── Render Modifiers ────────────────────────────────────────────────
function renderModifiers() {
  const container = document.getElementById('modifiers-container');
  for (const [name, mod] of Object.entries(ACEDIT.modifiers)) {
    const card = document.createElement('div');
    card.className = 'operator-card';
    card.innerHTML = `
      <span class="op-glyph">${mod.display}</span>
      <span class="op-name">${name}</span>
      <div class="op-desc">${mod.desc}</div>
    `;
    card.onclick = () => copyText(mod.combining);
    container.appendChild(card);
  }
}

// ── Init ────────────────────────────────────────────────────────────
renderRegisters();
renderOperators();
renderLigatures();
renderConstants();
renderPunctuation();
renderModifiers();
</script>
</body>
</html>
