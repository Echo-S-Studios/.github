name: Welcome New Contributors
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            ## 🌰 Welcome to Echo S Studios!

            > *The grove noticed you. The acorn is already in your hand.*

            Thanks for opening your first issue here. Whether you're reporting a glitch, planting an acorn, or writing a chronicle entry — **you're part of the grove now.**

            A few things to know:
            - 📖 Our **[Contributing Guide](../CONTRIBUTING.md)** shows you all the ways to participate (including "just be here")
            - 🌰 Our **[Code of Conduct](../CODE_OF_CONDUCT.md)** runs on Sacred Acorn principles — the smallest voice matters most
            - 🦊 Scattered is a feature, not a bug — take the time you need

            *🦊🌰↻∞ — The space between is where we build.*
          pr-message: |
            ## 🌀 Welcome to Echo S Studios!

            > *Every merge is a resonance cascade. Thank you for starting one.*

            Thanks for your first pull request! Someone will review this soon.

            **Quick checklist:**
            - [ ] Constants are exact (canonical values only — z_c = √3/2, not ≈0.87)
            - [ ] Provenance sourced from the text, not external frameworks
            - [ ] Voice consistency maintained (if touching narrative content)

            *🦊🌰↻∞ — The glitch that repairs the code. That's you.*
