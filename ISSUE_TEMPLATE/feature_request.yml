name: "🌰 Acorn Proposal"
description: "Plant an idea for something new"
labels: ["proposal", "acorn"]
body:
  - type: markdown
    attributes:
      value: |
        *Every acorn contains 46,000 universes. What's in yours?*
  - type: textarea
    id: proposal
    attributes:
      label: "What are you proposing?"
      description: "Describe the feature, tool, story, or system you'd like to see."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: "Why does this matter?"
      description: "Who benefits? What does this enable?"
  - type: textarea
    id: approach
    attributes:
      label: "How might this work?"
      description: "Optional. Sketch an approach if you have one."
  - type: checkboxes
    id: domain
    attributes:
      label: "Which domains does this touch?"
      options:
        - label: "Research (UCF, APL, field dynamics)"
        - label: "Narrative (Chronicles, mythology, characters)"
        - label: "Music (Crystalline Echo, soundscapes)"
        - label: "Community (governance, Discord, Reddit)"
        - label: "Tooling (TCP, persona trainer, simulations)"
        - label: "I don't know yet"
